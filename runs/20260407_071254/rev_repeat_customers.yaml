generated_sql:
  monthly_revenue: "WITH \"completed_orders$intermediate\" AS (\n  SELECT\n    base.status = 'completed' AS \"$filter_cond\"\
    ,\n    base.order_id AS order_id,\n    base.customer_id AS customer_id,\n    base.product_id AS product_id,\n    base.amount\
    \ AS amount,\n    base.order_date AS order_date,\n    base.status AS status\n  FROM orders AS base\n), completed_orders\
    \ AS (\n  SELECT\n    base.order_id AS order_id,\n    base.customer_id AS customer_id,\n    base.product_id AS product_id,\n\
    \    base.amount AS amount,\n    base.order_date AS order_date,\n    to_customer.segment AS segment,\n    to_customer.region\
    \ AS region\n  FROM \"completed_orders$intermediate\" AS base\n  LEFT JOIN customers AS to_customer\n    ON base.customer_id\
    \ = to_customer.customer_id\n  WHERE\n    base.\"$filter_cond\"\n), customer_order_counts AS (\n  SELECT\n    base.customer_id\
    \ AS customer_id,\n    COUNT(base.order_id) AS order_count\n  FROM completed_orders AS base\n  GROUP BY\n    base.customer_id\n\
    ), orders_with_counts AS (\n  SELECT\n    base.order_id AS order_id,\n    base.customer_id AS customer_id,\n    base.amount\
    \ AS amount,\n    base.order_date AS order_date,\n    base.segment AS segment\n  FROM completed_orders AS base\n), \"\
    repeat_customer_orders$intermediate\" AS (\n  SELECT\n    to_order_count.order_count > 1 AS \"$filter_cond\",\n    base.order_id\
    \ AS order_id,\n    base.customer_id AS customer_id,\n    base.amount AS amount,\n    base.order_date AS order_date,\n\
    \    base.segment AS segment\n  FROM orders_with_counts AS base\n  LEFT JOIN customer_order_counts AS to_order_count\n\
    \    ON base.customer_id = to_order_count.customer_id\n), repeat_customer_orders AS (\n  SELECT\n    base.order_id AS\
    \ order_id,\n    base.customer_id AS customer_id,\n    base.amount AS amount,\n    base.order_date AS order_date,\n  \
    \  base.segment AS segment\n  FROM \"repeat_customer_orders$intermediate\" AS base\n  WHERE\n    base.\"$filter_cond\"\
    \n), \"monthly_revenue$intermediate\" AS (\n  SELECT\n    YEAR(base.order_date) AS yr,\n    MONTH(base.order_date) AS\
    \ mnth,\n    base.order_id AS order_id,\n    base.customer_id AS customer_id,\n    base.amount AS amount,\n    base.order_date\
    \ AS order_date,\n    base.segment AS segment\n  FROM repeat_customer_orders AS base\n)\nSELECT\n  base.yr AS year,\n\
    \  base.mnth AS month,\n  SUM(base.amount) AS revenue,\n  COUNT(base.order_id) AS order_count\nFROM \"monthly_revenue$intermediate\"\
    \ AS base\nGROUP BY\n  base.yr,\n  base.mnth"
