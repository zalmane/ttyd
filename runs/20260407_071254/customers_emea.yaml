generated_sql:
  customer_summary: "WITH \"completed_orders$intermediate\" AS (\n  SELECT\n    base.status = 'completed' AS \"$filter_cond\"\
    ,\n    base.order_id AS order_id,\n    base.customer_id AS customer_id,\n    base.amount AS amount,\n    base.order_date\
    \ AS order_date,\n    base.status AS status\n  FROM orders AS base\n), completed_orders AS (\n  SELECT\n    base.order_id\
    \ AS order_id,\n    base.customer_id AS customer_id,\n    base.amount AS amount,\n    base.order_date AS order_date,\n\
    \    to_customer.name AS name,\n    to_customer.segment AS segment,\n    to_customer.region AS region\n  FROM \"completed_orders$intermediate\"\
    \ AS base\n  LEFT JOIN customers AS to_customer\n    ON base.customer_id = to_customer.customer_id\n  WHERE\n    base.\"\
    $filter_cond\"\n), \"emea_orders$intermediate\" AS (\n  SELECT\n    base.region = 'EMEA' AS \"$filter_cond\",\n    base.order_id\
    \ AS order_id,\n    base.customer_id AS customer_id,\n    base.amount AS amount,\n    base.order_date AS order_date,\n\
    \    base.name AS name,\n    base.segment AS segment,\n    base.region AS region\n  FROM completed_orders AS base\n),\
    \ emea_orders AS (\n  SELECT\n    base.order_id AS order_id,\n    base.customer_id AS customer_id,\n    base.amount AS\
    \ amount,\n    base.name AS name,\n    base.segment AS segment,\n    base.region AS region\n  FROM \"emea_orders$intermediate\"\
    \ AS base\n  WHERE\n    base.\"$filter_cond\"\n)\nSELECT\n  base.customer_id AS customer_id,\n  base.name AS name,\n \
    \ base.segment AS segment,\n  base.region AS region,\n  SUM(base.amount) AS total_spend,\n  COUNT(base.order_id) AS order_count\n\
    FROM emea_orders AS base\nGROUP BY\n  base.customer_id,\n  base.name,\n  base.segment,\n  base.region"
