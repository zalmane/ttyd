  arr_expiring_2025: "WITH \"active_subs$intermediate\" AS (\n  SELECT\n    (\n      base.status = 'active'\n    ) AS \"$filter_cond\"\
    ,\n    base.subscription_id AS subscription_id,\n    base.customer_id AS customer_id,\n    base.product_id AS product_id,\n\
    \    base.mrr AS mrr,\n    base.start_date AS start_date,\n    base.end_date AS end_date,\n    base.status AS status\n\
    \  FROM subscriptions AS base\n), active_subs AS (\n  SELECT\n    base.subscription_id AS subscription_id,\n    base.customer_id\
    \ AS customer_id,\n    base.product_id AS product_id,\n    base.mrr AS mrr,\n    base.start_date AS start_date,\n    base.end_date\
    \ AS end_date,\n    to_customer.segment AS segment,\n    to_customer.region AS region\n  FROM \"active_subs$intermediate\"\
    \ AS base\n  LEFT JOIN customers AS to_customer\n    ON base.customer_id = to_customer.customer_id\n  WHERE\n    base.\"\
    $filter_cond\"\n), \"subs_expiring_2025$intermediate\" AS (\n  SELECT\n    YEAR(base.end_date) = 2025 AS \"$filter_cond\"\
    ,\n    base.subscription_id AS subscription_id,\n    base.customer_id AS customer_id,\n    base.product_id AS product_id,\n\
    \    base.mrr AS mrr,\n    base.start_date AS start_date,\n    base.end_date AS end_date,\n    base.segment AS segment,\n\
    \    base.region AS region\n  FROM active_subs AS base\n), subs_expiring_2025 AS (\n  SELECT\n    base.subscription_id\
    \ AS subscription_id,\n    base.customer_id AS customer_id,\n    base.mrr AS mrr\n  FROM \"subs_expiring_2025$intermediate\"\
    \ AS base\n  WHERE\n    base.\"$filter_cond\"\n)\nSELECT\n  base.customer_id AS customer_id,\n  SUM(base.mrr) * 12 AS\
    \ arr,\n  COUNT(base.subscription_id) AS sub_count\nFROM subs_expiring_2025 AS base\nGROUP BY\n  base.customer_id"
