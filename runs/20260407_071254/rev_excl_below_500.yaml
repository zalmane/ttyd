generated_sql:
  monthly_revenue: "WITH \"completed_orders$intermediate\" AS (\n  SELECT\n    (\n      base.status = 'completed'\n    ) AND\
    \ (\n      base.amount >= 500.0\n    ) AS \"$filter_cond\",\n    base.order_id AS order_id,\n    base.customer_id AS customer_id,\n\
    \    base.product_id AS product_id,\n    base.amount AS amount,\n    base.order_date AS order_date,\n    base.status AS\
    \ status\n  FROM orders AS base\n), completed_orders AS (\n  SELECT\n    base.order_id AS order_id,\n    base.customer_id\
    \ AS customer_id,\n    base.product_id AS product_id,\n    base.amount AS amount,\n    base.order_date AS order_date,\n\
    \    to_customer.segment AS segment,\n    to_customer.region AS region\n  FROM \"completed_orders$intermediate\" AS base\n\
    \  LEFT JOIN customers AS to_customer\n    ON base.customer_id = to_customer.customer_id\n  WHERE\n    base.\"$filter_cond\"\
    \n), \"monthly_revenue$intermediate\" AS (\n  SELECT\n    YEAR(base.order_date) AS yr,\n    MONTH(base.order_date) AS\
    \ mnth,\n    base.order_id AS order_id,\n    base.customer_id AS customer_id,\n    base.product_id AS product_id,\n  \
    \  base.amount AS amount,\n    base.order_date AS order_date,\n    base.segment AS segment,\n    base.region AS region\n\
    \  FROM completed_orders AS base\n)\nSELECT\n  base.yr AS year,\n  base.mnth AS month,\n  SUM(base.amount) AS revenue,\n\
    \  COUNT(base.order_id) AS order_count\nFROM \"monthly_revenue$intermediate\" AS base\nGROUP BY\n  base.yr,\n  base.mnth"
  revenue_by_segment: "WITH \"completed_orders$intermediate\" AS (\n  SELECT\n    (\n      base.status = 'completed'\n   \
    \ ) AND (\n      base.amount >= 500.0\n    ) AS \"$filter_cond\",\n    base.order_id AS order_id,\n    base.customer_id\
    \ AS customer_id,\n    base.product_id AS product_id,\n    base.amount AS amount,\n    base.order_date AS order_date,\n\
    \    base.status AS status\n  FROM orders AS base\n), completed_orders AS (\n  SELECT\n    base.order_id AS order_id,\n\
    \    base.customer_id AS customer_id,\n    base.product_id AS product_id,\n    base.amount AS amount,\n    base.order_date\
    \ AS order_date,\n    to_customer.segment AS segment,\n    to_customer.region AS region\n  FROM \"completed_orders$intermediate\"\
    \ AS base\n  LEFT JOIN customers AS to_customer\n    ON base.customer_id = to_customer.customer_id\n  WHERE\n    base.\"\
    $filter_cond\"\n)\nSELECT\n  base.segment AS segment,\n  SUM(base.amount) AS revenue,\n  COUNT(base.order_id) AS order_count\n\
    FROM completed_orders AS base\nGROUP BY\n  base.segment"
