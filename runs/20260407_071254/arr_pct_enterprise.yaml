generated_sql:
  enterprise_arr_pct: "WITH \"active_subs$intermediate\" AS (\n  SELECT\n    base.status = 'active' AS \"$filter_cond\",\n\
    \    base.subscription_id AS subscription_id,\n    base.customer_id AS customer_id,\n    base.product_id AS product_id,\n\
    \    base.mrr AS mrr,\n    base.start_date AS start_date,\n    base.end_date AS end_date,\n    base.status AS status\n\
    \  FROM subscriptions AS base\n), active_subs AS (\n  SELECT\n    base.subscription_id AS subscription_id,\n    base.customer_id\
    \ AS customer_id,\n    base.product_id AS product_id,\n    base.mrr AS mrr,\n    base.start_date AS start_date,\n    base.end_date\
    \ AS end_date,\n    to_customer.segment AS segment,\n    to_customer.region AS region\n  FROM \"active_subs$intermediate\"\
    \ AS base\n  LEFT JOIN customers AS to_customer\n    ON base.customer_id = to_customer.customer_id\n  WHERE\n    base.\"\
    $filter_cond\"\n), arr_by_segment AS (\n  SELECT\n    base.segment AS segment,\n    SUM(base.mrr) * 12.0 AS arr,\n   \
    \ COUNT(base.subscription_id) AS sub_count\n  FROM active_subs AS base\n  GROUP BY\n    base.segment\n), \"total_arr$intermediate\"\
    \ AS (\n  SELECT\n    1 AS one,\n    base.subscription_id AS subscription_id,\n    base.customer_id AS customer_id,\n\
    \    base.product_id AS product_id,\n    base.mrr AS mrr,\n    base.start_date AS start_date,\n    base.end_date AS end_date,\n\
    \    base.segment AS segment,\n    base.region AS region\n  FROM active_subs AS base\n), total_arr AS (\n  SELECT\n  \
    \  SUM(base.mrr) * 12.0 AS total_arr\n  FROM \"total_arr$intermediate\" AS base\n  GROUP BY\n    base.one\n), segment_with_total\
    \ AS (\n  SELECT\n    base.segment AS segment,\n    base.arr AS segment_arr,\n    base.sub_count AS sub_count\n  FROM\
    \ arr_by_segment AS base\n), \"enterprise_arr_pct$intermediate\" AS (\n  SELECT\n    base.segment = 'Enterprise' AS \"\
    $filter_cond\",\n    base.segment AS segment,\n    base.segment_arr AS segment_arr,\n    base.sub_count AS sub_count\n\
    \  FROM segment_with_total AS base\n)\nSELECT\n  base.segment AS segment,\n  base.segment_arr AS enterprise_arr,\n  to_total.total_arr\
    \ AS total_arr,\n  (\n    base.segment_arr / to_total.total_arr\n  ) * 100.0 AS enterprise_pct\nFROM \"enterprise_arr_pct$intermediate\"\
    \ AS base\nLEFT JOIN total_arr AS to_total\n  ON 1 = 1\nWHERE\n  base.\"$filter_cond\""
