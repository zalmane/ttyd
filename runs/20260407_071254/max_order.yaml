generated_sql:
  largest_order: "WITH \"completed_orders$intermediate\" AS (\n  SELECT\n    (\n      base.status = 'completed'\n    ) AS\
    \ \"$filter_cond\",\n    base.order_id AS order_id,\n    base.customer_id AS customer_id,\n    base.product_id AS product_id,\n\
    \    base.amount AS amount,\n    base.order_date AS order_date,\n    base.status AS status\n  FROM orders AS base\n),\
    \ completed_orders AS (\n  SELECT\n    base.order_id AS order_id,\n    base.customer_id AS customer_id,\n    base.product_id\
    \ AS product_id,\n    base.amount AS amount,\n    base.order_date AS order_date,\n    to_customer.segment AS segment,\n\
    \    to_customer.region AS region\n  FROM \"completed_orders$intermediate\" AS base\n  LEFT JOIN customers AS to_customer\n\
    \    ON base.customer_id = to_customer.customer_id\n  WHERE\n    base.\"$filter_cond\"\n), \"largest_order$intermediate\"\
    \ AS (\n  SELECT\n    1 AS one,\n    base.order_id AS order_id,\n    base.customer_id AS customer_id,\n    base.product_id\
    \ AS product_id,\n    base.amount AS amount,\n    base.order_date AS order_date,\n    base.segment AS segment,\n    base.region\
    \ AS region\n  FROM completed_orders AS base\n)\nSELECT\n  MAX(base.amount) AS max_amount\nFROM \"largest_order$intermediate\"\
    \ AS base\nGROUP BY\n  base.one"
