generated_sql:
  classified_orders: "WITH \"classified_orders$intermediate\" AS (\n  SELECT\n    (\n      base.status = 'completed'\n   \
    \ )\n    AND (\n      base.amount >= 4000.0\n    )\n    AND (\n      base.order_date >= MAKE_DATE(2025, 3, 1)\n    )\n\
    \    AND (\n      base.order_date <= MAKE_DATE(2025, 3, 31)\n    ) AS \"$filter_cond\",\n    base.order_id AS order_id,\n\
    \    base.customer_id AS customer_id,\n    base.product_id AS product_id,\n    base.amount AS amount,\n    base.order_date\
    \ AS order_date,\n    base.status AS status\n  FROM orders AS base\n)\nSELECT\n  base.order_id AS order_id,\n  base.customer_id\
    \ AS customer_id,\n  base.amount AS amount,\n  base.order_date AS order_date,\n  to_customer.segment AS segment,\n  to_customer.region\
    \ AS region,\n  CASE\n    WHEN base.amount >= 4000.0\n    THEN 'Large'\n    WHEN base.amount >= 1000.0\n    THEN 'Medium'\n\
    \    ELSE 'Small'\n  END AS size_tier,\n  CASE\n    WHEN to_customer.segment = 'Enterprise' AND base.amount >= 4000.0\n\
    \    THEN 'Strategic'\n    WHEN to_customer.segment = 'Enterprise'\n    THEN 'Enterprise Standard'\n    WHEN base.amount\
    \ >= 2000.0\n    THEN 'Growth'\n    ELSE 'Transactional'\n  END AS deal_type\nFROM \"classified_orders$intermediate\"\
    \ AS base\nLEFT JOIN customers AS to_customer\n  ON base.customer_id = to_customer.customer_id\nWHERE\n  base.\"$filter_cond\""
