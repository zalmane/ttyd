    \    base.year AS year,\n    base.month AS month,\n    base.revenue AS revenue,\n    base.order_count AS order_count\n\
    \  FROM monthly_revenue AS base\n), january_revenue AS (\n  SELECT\n    base.year AS year,\n    base.revenue AS jan_revenue\n\
