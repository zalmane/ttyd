    \ AS (\n  SELECT\n    base.order_id AS order_id,\n    base.customer_id AS customer_id,\n    base.product_id AS product_id,\n\
    \    base.amount AS amount,\n    base.order_date AS order_date,\n    to_customer.segment AS segment,\n    to_customer.region\
    \ AS region\n  FROM \"completed_orders$intermediate\" AS base\n  LEFT JOIN customers AS to_customer\n    ON base.customer_id\
    \ = to_customer.customer_id\n  WHERE\n    base.\"$filter_cond\"\n), \"monthly_revenue$intermediate\" AS (\n  SELECT\n\
    \    YEAR(base.order_date) AS yr,\n    MONTH(base.order_date) AS mnth,\n    base.order_id AS order_id,\n    base.customer_id\
    \ AS customer_id,\n    base.product_id AS product_id,\n    base.amount AS amount,\n    base.order_date AS order_date,\n\
    \    base.segment AS segment,\n    base.region AS region\n  FROM completed_orders AS base\n), monthly_revenue AS (\n \
    \ SELECT\n    base.yr AS year,\n    base.mnth AS month,\n    SUM(base.amount) AS revenue,\n    COUNT(base.order_id) AS\
