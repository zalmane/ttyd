generated_sql:
  deals_by_size_tier: "WITH \"classified_orders$intermediate\" AS (\n  SELECT\n    (\n      base.status = 'completed'\n  \
    \  ) AS \"$filter_cond\",\n    base.order_id AS order_id,\n    base.customer_id AS customer_id,\n    base.product_id AS\
    \ product_id,\n    base.amount AS amount,\n    base.order_date AS order_date,\n    base.status AS status\n  FROM orders\
    \ AS base\n), classified_orders AS (\n  SELECT\n    base.order_id AS order_id,\n    base.customer_id AS customer_id,\n\
    \    base.amount AS amount,\n    base.order_date AS order_date,\n    to_customer.segment AS segment,\n    to_customer.region\
    \ AS region,\n    CASE\n      WHEN base.amount >= 4000.0\n      THEN 'Large'\n      WHEN base.amount >= 1000.0\n     \
    \ THEN 'Medium'\n      ELSE 'Small'\n    END AS size_tier,\n    CASE\n      WHEN to_customer.segment = 'Enterprise' AND\
    \ base.amount >= 4000.0\n      THEN 'Strategic'\n      WHEN to_customer.segment = 'Enterprise'\n      THEN 'Enterprise\
    \ Standard'\n      WHEN base.amount >= 2000.0\n      THEN 'Growth'\n      ELSE 'Transactional'\n    END AS deal_type\n\
    \  FROM \"classified_orders$intermediate\" AS base\n  LEFT JOIN customers AS to_customer\n    ON base.customer_id = to_customer.customer_id\n\
    \  WHERE\n    base.\"$filter_cond\"\n)\nSELECT\n  base.size_tier AS size_tier,\n  COUNT(base.order_id) AS deal_count\n\
    FROM classified_orders AS base\nGROUP BY\n  base.size_tier"
