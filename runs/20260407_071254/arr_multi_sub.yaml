generated_sql:
  arr_multi_sub_customers: "WITH \"active_subs$intermediate\" AS (\n  SELECT\n    (\n      base.status = 'active'\n    ) AS\
    \ \"$filter_cond\",\n    base.subscription_id AS subscription_id,\n    base.customer_id AS customer_id,\n    base.product_id\
    \ AS product_id,\n    base.mrr AS mrr,\n    base.start_date AS start_date,\n    base.end_date AS end_date,\n    base.status\
    \ AS status\n  FROM subscriptions AS base\n), active_subs AS (\n  SELECT\n    base.subscription_id AS subscription_id,\n\
    \    base.customer_id AS customer_id,\n    base.product_id AS product_id,\n    base.mrr AS mrr,\n    base.start_date AS\
    \ start_date,\n    base.end_date AS end_date,\n    to_customer.segment AS segment,\n    to_customer.region AS region\n\
    \  FROM \"active_subs$intermediate\" AS base\n  LEFT JOIN customers AS to_customer\n    ON base.customer_id = to_customer.customer_id\n\
    \  WHERE\n    base.\"$filter_cond\"\n), customer_sub_counts AS (\n  SELECT\n    base.customer_id AS customer_id,\n   \
    \ COUNT(base.subscription_id) AS sub_count,\n    SUM(base.mrr) AS total_mrr\n  FROM active_subs AS base\n  GROUP BY\n\
    \    base.customer_id\n), \"arr_multi_sub_customers$intermediate\" AS (\n  SELECT\n    base.sub_count > 1 AS \"$filter_cond\"\
    ,\n    base.customer_id AS customer_id,\n    base.sub_count AS sub_count,\n    base.total_mrr AS total_mrr\n  FROM customer_sub_counts\
    \ AS base\n)\nSELECT\n  base.customer_id AS customer_id,\n  base.sub_count AS sub_count,\n  base.total_mrr * 12 AS arr\n\
    FROM \"arr_multi_sub_customers$intermediate\" AS base\nWHERE\n  base.\"$filter_cond\""
