id: above_avg_mrr
question: Customers paying above average MRR
policy: subscription_arr
golden_sql: SELECT c.name, s.mrr FROM subscriptions s JOIN customers c ON s.customer_id=c.customer_id WHERE s.status='active' AND s.mrr > (SELECT AVG(mrr) FROM subscriptions WHERE status='active' AND mrr>0) ORDER BY s.mrr DESC
result_type: table
