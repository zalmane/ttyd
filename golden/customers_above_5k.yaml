id: customers_above_5k
question: Customers with more than $5000 in total spend
policy: customer_health
golden_sql: SELECT c.name, SUM(o.amount) as total_spend FROM orders o JOIN customers
  c ON o.customer_id=c.customer_id WHERE o.status='completed' GROUP BY c.customer_id,
  c.name HAVING SUM(o.amount) > 5000 ORDER BY total_spend DESC
result_type: table
